spring:
  application:
    name: allblue-was-server
  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        default_batch_fetch_size: 30

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

jwt:
  access-token-validity-in-seconds: 3600
  refresh-token-validity-in-seconds: 1209600
  admin-access-token-validity-in-seconds: 3600

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
      slo:
        http.server.requests: 100ms, 250ms, 500ms, 1s, 5s

worker:
  n8n:
    webhook-url: ${N8N_WEBHOOK_URL:http://localhost:5678/webhook/outfit-filter}

cafe24:
  client-id: ${CAFE24_CLIENT_ID:your-client-id}
  client-secret: ${CAFE24_CLIENT_SECRET:your-client-secret}
  redirect-uri: ${CAFE24_REDIRECT_URI:http://localhost:8080/s/v1/oauth/callback}
  scopes: ${CAFE24_SCOPES:mall.read_product,mall.write_product,mall.read_order,mall.read_customer}
