spring:
  application:
    name: allblue-was-server
  profiles:
    active: dev
  docker:
    compose:
      enabled: false

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:allblue}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:allblue_password}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      ssl:
        enabled: false

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        default_batch_fetch_size: 30

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy-google-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-google-secret}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

jwt:
  secret: ${JWT_SECRET_KEY:dGhpcy1pcy1hLWR1bW15LXNlY3JldC1rZXktZm9yLXRlc3RpbmctcHVycG9zZXMtb25seS0xMjM=}
  access-token-validity-in-seconds: 3600
  refresh-token-validity-in-seconds: 1209600
  admin-access-token-validity-in-seconds: 3600

app:
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/redirect}
    login-page: ${LOGIN_PAGE_URI:http://localhost:3000/login}
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  cookie:
    domain: ${COOKIE_DOMAIN:localhost}
    secure: ${COOKIE_SECURE:false}
  image:
    base-url: ${IMAGE_BASE_URL:http://localhost:8080/images}
    product-path: ${IMAGE_PRODUCT_PATH:./data/images/products}
    model-path: ${IMAGE_MODEL_PATH:./data/images/models}
    lookbook-output-path: ${IMAGE_LOOKBOOK_OUTPUT_PATH:./data/images/lookbooks}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
      slo:
        http.server.requests: 100ms, 250ms, 500ms, 1s, 5s

worker:
  n8n:
    webhook-url: ${N8N_WEBHOOK_URL:http://127.0.0.1:5678/webhook/outfit-filter}

cafe24:
  client-id: ${CAFE24_CLIENT_ID:your-client-id}
  client-secret: ${CAFE24_CLIENT_SECRET:your-client-secret}
  redirect-uri: ${CAFE24_REDIRECT_URI:http://localhost:8080/s/v1/oauth/callback}
  scopes: ${CAFE24_SCOPES:mall.read_product,mall.write_product,mall.read_order,mall.read_customer}
